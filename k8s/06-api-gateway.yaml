apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: clinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: clinic/api-gateway:1.1
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: PATIENT_SERVICE_URL
          value: http://patient-service:8081
        - name: APPOINTMENT_SERVICE_URL
          value: http://appointment-service:8082
        - name: TREATMENT_SERVICE_URL
          value: http://treatment-service:8083
        - name: BILLING_SERVICE_URL
          value: http://billing-service:8084
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: clinic
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
